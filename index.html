<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .parking {
      background: white;
      margin: 1rem;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .ok   { border-left: 6px solid #15803d; }
    .warn { border-left: 6px solid #c2410c; }
    .full { border-left: 6px solid #b91c1c; }
  </style>
</head>

<body>

<header>Parkings relais TCL – LIVE</header>
<div id="list">Chargement…</div>

<script>
(async function () {
  const container = document.getElementById("list");

  const res = await fetch("/api/parkings-relais");
  const payload = await res.json();

  console.log("RAW DATA:", payload);

  // ✅ structure réelle confirmée
  const parkings = payload.data;

  // ✅ condition robuste
  if (!parkings || !parkings[0]) {
    container.textContent = "Aucun parking disponible";
    return;
  }

  let html = "";

  for (const p of parkings) {
    const capacite = p.capacite;
    const libres = capacite - (p.place_hand ?? 0);
    const taux = libres / capacite;

    let cls = "ok";
    if (taux < 0.2) cls = "full";
    else if (taux < 0.5) cls = "warn";

    html += `
      <div class="parking ${cls}">
        <strong>${p.nom}</strong><br/>
        ${libres} places libres / ${capacite}
      </div>
    `;
  }

  container.innerHTML = html;
})();
</script>

</body>
</html>
