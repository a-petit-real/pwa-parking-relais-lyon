<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P+R – V1</title>

  <style>
    :root {
      --bg: #0f131a;
      --card: #161b24;
      --text-main: #ffffff;
      --text-muted: #9aa4b2;

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;

      --bar-bg: #2a2f3a;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
    }

    .parking-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      max-width: 360px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* --- Disponibilité + confiance --- */

    .availability {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .free-places {
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
    }

    .confidence {
      display: flex;
      gap: 4px;
    }

    .confidence span {
      width: 10px;
      height: 16px;
      border-radius: 2px;
      background: var(--bar-bg);
    }

    .confidence.stable span.fill {
      background: var(--green);
    }

    .confidence.variable span.fill {
      background: var(--orange);
    }

    .confidence.often_full span.fill {
      background: var(--red);
    }

    .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* --- Transports --- */

    .transports {
      display: flex;
      gap: 8px;
      font-size: 20px;
      margin: 16px 0;
    }

    /* --- Jauge type essence --- */

    .fuel-gauge {
      height: 6px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .fuel-gauge .level {
      height: 100%;
      border-radius: 999px;
    }

    .fuel-gauge.empty .level { width: 0%; }
    .fuel-gauge.quarter .level { width: 25%; }
    .fuel-gauge.half .level { width: 50%; }
    .fuel-gauge.three_quarters .level { width: 75%; }
    .fuel-gauge.full .level { width: 100%; }

    .fuel-gauge .level.green { background: var(--green); }
    .fuel-gauge .level.orange { background: var(--orange); }
    .fuel-gauge .level.red { background: var(--red); }
  </style>
</head>

<body>

  <!-- Carte Parking V1 -->
  <div class="parking-card">

    <div class="parking-name">Mermoz Pinel</div>

    <div class="availability">
      <div>
        <div class="free-places">6</div>
        <div class="label">places libres</div>
      </div>

      <!-- Échelle de confiance : 1 / 3 -->
      <div class="confidence often_full">
        <span class="fill"></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Transports accessibles -->
    <div class="transports">
      <span title="Métro">🚇</span>
      <span title="Tram">🚊</span>
      <span title="Bus">🚍</span>
      <span title="Vélo'v">🚲</span>
    </div>

    <!-- Jauge de disponibilité -->
    <div class="fuel-gauge quarter">
      <div class="level red"></div>
    </div>

  </div>

</body>
</html>
