<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – places disponibles</title>

  <style>
    :root {
      --bg: #0f131a;
      --card: #161b24;
      --header: #0f131a;
      --border: #1f2430;

      --text-main: #ffffff;
      --text-muted: #a5adbd;

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;

      --gauge-bg: #2a2f3a;
      --mode-border: #e2e8f0;
      --tcl-red: #e30613;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      font-family: system-ui, sans-serif;
      color: var(--text-main);
    }

    /* ===== HEADER STICKY ===== */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tcl-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--tcl-red);
      color: white;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .page-header h1 {
      font-size: 17px;
      font-weight: 700;
      margin: 0;
    }

    .page-header span {
      font-weight: 500;
      color: var(--text-muted);
    }

    /* ===== LOADER ===== */
    .loader-container {
      padding: 48px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .loader {
      display: flex;
      gap: 8px;
    }

    .loader span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--tcl-red);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader span:nth-child(2) { animation-delay: 0.15s; }
    .loader span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.3); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .loader-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ===== LIST ===== */
    #app { padding: 16px; }

    .parking-card {
      max-width: 380px;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .availability-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .count {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.1;
    }

    .label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== JAUGE ===== */
    .fill-gauge {
      display: flex;
      gap: 4px;
    }

    .fill-gauge span {
      width: 10px;
      height: 14px;
      border-radius: 3px;
      background: var(--gauge-bg);
    }

    .fill-1 span:nth-child(-n+1) { background: var(--red); }
    .fill-2 span:nth-child(-n+2) { background: var(--orange); }
    .fill-3 span:nth-child(-n+3) { background: var(--green); }
    .fill-4 span:nth-child(-n+4) { background: var(--green); }

    /* ===== TRANSPORTS ===== */
    .transport-lines {
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .transport-group {
      margin-top: 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid var(--mode-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      flex-shrink: 0;
      color: var(--text-main);
    }

    .error { padding: 24px; color: #ff6b6b; }
  </style>
</head>

<body>

<header class="page-header">
  <div class="tcl-logo">TCL</div>
  <h1>Parkings relais TCL <span>– places disponibles</span></h1>
</header>

<div id="content">
  <div class="loader-container" id="loader">
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
    <div class="loader-text">Chargement des disponibilités…</div>
  </div>
  <div id="app" style="display:none;"></div>
</div>

<script>
fetch("/api/parkings-relais")
  .then(r => r.json())
  .then(data => {
    const root = document.getElementById("app");
    const loader = document.getElementById("loader");
    let parkings = data.values || [];

    // ✅ Mermoz Pinel en tête
    parkings = parkings.sort((a, b) => {
      if (a.nom === "Mermoz Pinel") return -1;
      if (b.nom === "Mermoz Pinel") return 1;
      return 0;
    });

    loader.style.display = "none";
    root.style.display = "block";

    parkings.forEach(p => {
      const ratio = p.nb_tot_place_dispo / p.capacite;
      let level = 0;
      if (ratio > 0.75) level = 4;
      else if (ratio > 0.5) level = 3;
      else if (ratio > 0.25) level = 2;
      else if (ratio > 0) level = 1;

      const lines = p.transport_lines || {};

      const card = document.createElement("div");
      card.className = "parking-card";
      card.innerHTML = `
        <div class="parking-name">${p.nom}</div>

        <div class="availability-row">
          <div>
            <div class="count">${p.nb_tot_place_dispo}</div>
            <div class="label">places disponibles</div>
          </div>
          <div class="fill-gauge fill-${level}">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="transport-lines">
          <div class="transport-group">
            <div class="badge">M</div>
            ${(lines.metro && lines.metro.length) ? lines.metro.join(", ") : "—"}
          </div>
          <div class="transport-group">
            <div class="badge">T</div>
            ${(lines.tram && lines.tram.length) ? lines.tram.join(", ") : "—"}
          </div>
          <div class="transport-group">
            <div class="badge">B</div>
            ${(lines.bus && lines.bus.length) ? lines.bus.join(", ") : "—"}
          </div>
        </div>
      `;
      root.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById("loader").innerHTML =
      "<div class='error'>Erreur de chargement des données</div>";
  });
</script>

</body>
</html>
