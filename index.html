<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Parkings relais TCL – temps réel</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .container {
      padding: 1rem;
    }
    .parking {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .title {
      font-weight: 600;
    }
    .status {
      margin-top: 0.25rem;
      font-weight: 500;
    }
    .ok { color: #15803d; }
    .warn { color: #c2410c; }
    .full { color: #b91c1c; }
    .updated {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #475569;
      text-align: center;
    }
  </style>
</head>

<body>
  <header>Parkings relais TCL – temps réel</header>

  <div class="container" id="list">Chargement…</div>
  <div class="updated" id="updated"></div>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
  }

  async function loadParkings() {
    try {
      const res = await fetch("/api/parkings-relais");
      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      // ✅ Extraction universelle (tous cas rencontrés)
      const parkings =
        Array.isArray(data)
          ? data
          : Array.isArray(data?.data)
            ? data.data
            : Array.isArray(data?.values)
              ? data.values
              : Array.isArray(data?.features)
                ? data.features.map(f => f.properties || f)
                : [];

      if (parkings.length === 0) {
        list.textContent = "Aucune donnée disponible.";
        return;
      }

      parkings.forEach(p => {
        const nom = p.nom;
        const capacite = p.capacite;
        const disponibles =
          p.places_libres ??
          p.places_disponibles ??
          (capacite - (p.place_hand ?? 0));

        if (!nom || capacite == null || disponibles == null) return;

        const taux = capacite > 0 ? disponibles / capacite : 0;
        let cls = "ok";
        if (taux < 0.2) cls = "full";
        else if (taux < 0.5) cls = "warn";

        const div = document.createElement("div");
        div.className = "parking";
        div.innerHTML = `
          <div class="title">${nom}</div>
          <div class="status ${cls}">
            ${disponibles} places disponibles / ${capacite}
          </div>
        `;
        list.appendChild(div);
      });

      document.getElementById("updated").textContent =
        "Mise à jour : " + new Date().toLocaleTimeString();

    } catch (e) {
      document.getElementById("list").textContent =
        "Erreur de chargement des données.";
      console.error(e);
    }
  }
