<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      font-weight: 600;
      text-align: center;
    }
    .container {
      padding: 1rem;
    }
    .parking {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .ok { color: #15803d; }
    .warn { color: #c2410c; }
    .full { color: #b91c1c; }
  </style>
</head>

<body>
  <header>Parkings relais TCL – LIVE</header>
  <div class="container" id="list">Chargement…</div>

<script>
async function load() {
  const list = document.getElementById("list");

  const res = await fetch("/api/parkings-relais");
  const data = await res.json();

  console.log("DATA FROM API:", data);

  if (!Array.isArray(data)) {
    list.textContent = "Réponse API invalide";
    return;
  }

  list.innerHTML = "";

  data.forEach(p => {
    const nom = p.nom;
    const capacite = p.capacite;
    const dispo = capacite - (p.place_hand ?? 0);

    if (!nom || capacite == null || dispo == null) return;

    let cls = "ok";
    const taux = dispo / capacite;
    if (taux < 0.2) cls = "full";
    else if (taux < 0.5) cls = "warn";

    list.innerHTML += `
      <div class="parking ${cls}">
        <strong>${nom}</strong><br/>
        ${dispo} places libres / ${capacite}
      </div>
    `;
  });
}

load();
</script>
</body>
</html>
