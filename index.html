<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P+R – V1</title>

  <style>
    :root {
      --bg: #0f131a;
      --card: #161b24;

      --text-main: #ffffff;
      --text-muted: #a0a8b8;

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;

      --gauge-bg: #2a2f3a;
      --gauge-fill: #22c55e;

      --icon: #c9d1de;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
    }

    .parking-card {
      max-width: 380px;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* --- Disponibilité --- */

    .availability-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .free-places {
      font-size: 32px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* --- Jauge type essence --- */

    .fuel-gauge {
      width: 72px;
      height: 8px;
      background: var(--gauge-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .fuel-gauge .level {
      height: 100%;
      background: var(--gauge-fill);
      border-radius: 999px;
    }

    /* niveaux côté back */
    .fuel-gauge.empty  .level { width: 0%;  background: var(--red); }
    .fuel-gauge.quarter .level { width: 25%; background: var(--red); }
    .fuel-gauge.half   .level { width: 50%; background: var(--orange); }
    .fuel-gauge.three-quarters .level { width: 75%; background: var(--green); }
    .fuel-gauge.full   .level { width: 100%; background: var(--green); }

    /* --- Transports --- */

    .transports {
      display: flex;
      gap: 14px;
      margin: 14px 0 10px;
    }

    .transport-icon {
      width: 24px;
      height: 24px;
      color: var(--icon);
    }

    /* --- Barre de remplissage globale --- */

    .fill-bar {
      height: 6px;
      background: var(--gauge-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill-bar .fill {
      height: 100%;
      background: var(--gauge-fill);
      width: 50%;
    }
  </style>
</head>

<body>

  <div class="parking-card">

    <div class="parking-name">Mermoz Pinel</div>

    <!-- Disponibilité -->
    <div class="availability-row">
      <div class="free-places">6 places libres</div>

      <!-- Jauge type essence -->
      <div class="fuel-gauge quarter">
        <div class="level"></div>
      </div>
    </div>

    <!-- Transports accessibles -->
    <div class="transports">

      <!-- Métro -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="10" stroke-width="2"/>
        <path d="M8 16V8l4 5 4-5v8" stroke-width="2" stroke-linejoin="round"/>
      </svg>

      <!-- Tram -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="4" y="3" width="16" height="14" rx="2" stroke-width="2"/>
        <path d="M8 17l-2 4M16 17l2 4" stroke-width="2"/>
      </svg>

      <!-- Bus -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="4" width="18" height="13" rx="2" stroke-width="2"/>
        <circle cx="8" cy="18" r="1.5" />
        <circle cx="16" cy="18" r="1.5" />
      </svg>

      <!-- Vélo'v -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="6" cy="17" r="4"/>
        <circle cx="18" cy="17" r="4"/>
        <path d="M6 17l6-10h4l-2 4"/>
      </svg>

    </div>

    <!-- Barre de remplissage globale -->
    <div class="fill-bar">
      <div class="fill" style="width: 80%"></div>
    </div>

  </div>

</body>
</html>
