<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P+R – V1</title>

  <style>
    :root {
      --bg: #0f131a;
      --card: #161b24;

      --text-main: #ffffff;
      --text-muted: #a5adbd;

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;

      --gauge-bg: #2a2f3a;

      --icon: #cfd6e4;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
    }

    .parking-card {
      max-width: 380px;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* --- Bloc disponibilité --- */

    .availability-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .availability-text {
      display: flex;
      flex-direction: column;
    }

    .free-places {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.1;
    }

    .label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* --- Jauge remplissage (0/4 → 4/4) --- */

    .fill-gauge {
      display: flex;
      gap: 3px;
    }

    .fill-gauge span {
      width: 10px;
      height: 14px;
      border-radius: 3px;
      background: var(--gauge-bg);
    }

    /* États pilotés par le backend */
    .fill-0 span.fill { background: none; }
    .fill-1 span:nth-child(-n+1) { background: var(--red); }
    .fill-2 span:nth-child(-n+2) { background: var(--orange); }
    .fill-3 span:nth-child(-n+3) { background: var(--green); }
    .fill-4 span:nth-child(-n+4) { background: var(--green); }

    /* --- Transports --- */

    .transports {
      display: flex;
      gap: 14px;
      margin-top: 14px;
    }

    .transport-icon {
      width: 22px;
      height: 22px;
      color: var(--icon);
    }
  </style>
</head>

<body>

  <div class="parking-card">

    <div class="parking-name">Mermoz Pinel</div>

    <!-- Disponibilité -->
    <div class="availability-row">
      <div class="availability-text">
        <div class="free-places">6</div>
        <div class="label">places libres</div>
      </div>

      <!-- Jauge de remplissage : ici 1/4 -->
      <div class="fill-gauge fill-1">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Transports -->
    <div class="transports">

      <!-- Métro -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="10" stroke-width="2"/>
        <path d="M8 16V8l4 5 4-5v8" stroke-width="2"/>
      </svg>

      <!-- Tram -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="4" y="3" width="16" height="14" rx="2" stroke-width="2"/>
        <path d="M7 21l3-4M17 21l-3-4" stroke-width="2"/>
      </svg>

      <!-- Bus -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="4" width="18" height="13" rx="2" stroke-width="2"/>
        <circle cx="8" cy="18" r="1.5"/>
        <circle cx="16" cy="18" r="1.5"/>
      </svg>

      <!-- Vélo'v -->
      <svg class="transport-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="6" cy="17" r="4"/>
        <circle cx="18" cy="17" r="4"/>
        <path d="M6 17l6-10h4l-2 4"/>
      </svg>

    </div>

  </div>

</body>
</html>
