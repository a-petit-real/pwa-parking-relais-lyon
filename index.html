<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .parking {
      background: white;
      margin: 1rem;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .ok { color: green; }
    .warn { color: orange; }
    .full { color: red; }
  </style>
</head>

<body>

<header>Parkings relais TCL – LIVE</header>
<div id="list">Chargement…</div>

<script>
async function load() {
  const list = document.getElementById("list");

  const res = await fetch("/api/parkings-relais");
  const payload = await res.json();

  console.log("RAW DATA:", payload);

  // ✅ UNIQUE STRUCTURE VALIDE (confirmée par ta console)
  const parkings = Array.isArray(payload.data) ? payload.data : [];

  list.innerHTML = "";

  parkings.forEach(p => {
    const nom = p.nom;
    const capacite = p.capacite;
    const placesLibres = capacite - (p.place_hand ?? 0);

    const taux = placesLibres / capacite;
    let cls = "ok";
    if (taux < 0.2) cls = "full";
    else if (taux < 0.5) cls = "warn";

    list.innerHTML += `
      <div class="parking ${cls}">
        <strong>${nom}</strong><br/>
        ${placesLibres} places libres / ${capacite}
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
