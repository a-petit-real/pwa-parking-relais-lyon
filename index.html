<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .parking {
      background: white;
      margin: 1rem;
      padding: 1rem;
      border-radius: 8px;
    }
    .ok { color: green; }
    .warn { color: orange; }
    .full { color: red; }
  </style>
</head>

<body>
<header>Parkings relais TCL – LIVE</header>

<div id="list">Chargement…</div>

<script>
async function load() {
  const res = await fetch("/api/parkings-relais");
  const data = await res.json();

  console.log("RAW DATA:", data);

  // ✅ CLEF CRITIQUE (Datapusher Grand Lyon)
  const parkings =
    Object.values(data).find(v => Array.isArray(v)) ?? [];

  const list = document.getElementById("list");
  list.innerHTML = "";

  parkings.forEach(p => {
    const dispo = p.capacite - (p.place_hand ?? 0);
    const taux = dispo / p.capacite;

    let cls = "ok";
    if (taux < 0.2) cls = "full";
    else if (taux < 0.5) cls = "warn";

    list.innerHTML += `
      <div class="parking ${cls}">
        <strong>${p.nom}</strong><br/>
        ${dispo} places libres / ${p.capacite}
      </div>
    `;
  });
}

load();
</script>
</body>
</html>
