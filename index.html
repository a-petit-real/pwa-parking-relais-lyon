<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Parkings relais · LIVE</title>

  <style>
    :root {
      --bg: #0b0e11;
      --surface: #141821;
      --surface-active: #1e2633;
      --text-main: #ffffff;
      --text-secondary: #9ca3af;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --divider: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    /* ========== HEADER ========== */

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, #0b0e11 0%, #0b0e11e6 100%);
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--divider);
    }

    .title {
      font-size: 18px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ========== TABS (visuels) ========== */

    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 10px;
      font-size: 14px;
      background: var(--surface);
      color: var(--text-secondary);
    }

    .tab.active {
      background: var(--surface-active);
      color: var(--text-main);
      font-weight: 500;
    }

    /* ========== LIST ========== */

    .list {
      padding: 12px;
    }

    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .places {
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }

    .places-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .capacity {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    /* ========== BAR ========== */

    .bar {
      margin-top: 10px;
      height: 6px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
  </style>
</head>

<body>

<header>
  <div class="title">Parkings relais · LIVE</div>
  <div class="subtitle" id="updated">Mise à jour…</div>

  <div class="tabs">
    <div class="tab active">Autour de moi</div>
    <div class="tab">+ de places</div>
  </div>
</header>

<div class="list" id="list">
  Chargement…
</div>

<script>
/* ========= UTILITAIRES ROBUSTES ========= */

function toNumber(value) {
  if (value === undefined || value === null) return 0;
  const n = Number(value);
  return Number.isNaN(n) ? 0 : n;
}

/* ========= MAIN ========= */

(async function () {
  const res = await fetch("/api/parkings-relais");
  const payload = await res.json();

  console.log("PAYLOAD BRUT :", payload);

  const list = document.getElementById("list");
  const updated = document.getElementById("updated");

  const parkings = Array.isArray(payload.values) ? payload.values : [];

  if (payload.last_update) {
    updated.textContent = "Mise à jour : " + payload.last_update.slice(11, 16);
  } else {
    updated.textContent = "Mise à jour en temps réel";
  }

  /* Règle métier : Mermoz‑Pinel toujours premier */
  const MERMOZ = "Mermoz-Pinel";

  const ordered = [
    ...parkings.filter(p => p.nom === MERMOZ),
    ...parkings.filter(p => p.nom !== MERMOZ)
  ];

  list.innerHTML = "";

  for (const p of ordered) {

    const libres = toNumber(
      p.places_libres ??
      p.places_disponibles ??
      p.nb_places_disponibles ??
      p.disponibilite?.places_libres ??
      p.disponibilite?.libres ??
      p.libres
    );

    const capacite = toNumber(p.capacite);
    const ratio = capacite > 0 ? libres / capacite : 0;

    let color;
    if (libres === 0) color = "var(--red)";
    else if (ratio < 0.15) color = "var(--orange)";
    else color = "var(--green)";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="parking-name">${p.nom}</div>
      <div class="places">${libres}</div>
      <div class="places-label">places libres</div>
      <div class="capacity">Capacité ${capacite}</div>
      <div class="bar">
        <div class="bar-fill"
             style="width:${Math.min(100, ratio * 100)}%; background:${color}">
        </div>
      </div>
    `;

    list.appendChild(card);
  }
})();
</script>

</body>
</html>
