<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – temps réel</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .container {
      padding: 1rem;
    }
    .parking {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .ok { color: green; }
    .warn { color: orange; }
    .full { color: red; }
  </style>
</head>

<body>
  <header>Parkings relais TCL – temps réel</header>
  <div class="container" id="list">Chargement…</div>

<script>
async function load() {
  const list = document.getElementById("list");

  const res = await fetch("/api/parkings-relais");
  const data = await res.json();

  console.log("DATA:", data);

  const parkings = Array.isArray(data)
    ? data
    : Array.isArray(data.data)
      ? data.data
      : [];

  list.innerHTML = "";

  parkings.forEach(p => {
    const dispo = p.capacite - (p.place_hand ?? 0);
    const taux = dispo / p.capacite;

    let cls = "ok";
    if (taux < 0.2) cls = "full";
    else if (taux < 0.5) cls = "warn";

    list.innerHTML += `
      <div class="parking ${cls}">
        <strong>${p.nom}</strong><br/>
        ${dispo} places libres / ${p.capacite}
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
