<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais – places disponibles</title>

  <style>
    :root {
      --bg: #0f131a;
      --card: #161b24;
      --header: #0f131a;

      --text-main: #ffffff;
      --text-muted: #a5adbd;

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;

      --gauge-bg: #2a2f3a;
      --mode-border: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: system-ui, sans-serif;
      color: var(--text-main);
    }

    /* ===== HEADER STICKY ===== */

    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header);
      padding: 16px;
      border-bottom: 1px solid #1f2430;
    }

    .page-header h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }

    .page-header span {
      font-weight: 500;
      color: var(--text-muted);
    }

    /* ===== LIST ===== */

    #app {
      padding: 16px;
    }

    .parking-card {
      max-width: 380px;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .availability-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .availability-text {
      display: flex;
      flex-direction: column;
    }

    .count {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.1;
    }

    .label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== JAUGE REMPLISSAGE ===== */

    .fill-gauge {
      display: flex;
      gap: 4px;
    }

    .fill-gauge span {
      width: 10px;
      height: 14px;
      border-radius: 3px;
      background: var(--gauge-bg);
    }

    .fill-1 span:nth-child(-n+1) { background: var(--red); }
    .fill-2 span:nth-child(-n+2) { background: var(--orange); }
    .fill-3 span:nth-child(-n+3) { background: var(--green); }
    .fill-4 span:nth-child(-n+4) { background: var(--green); }

    /* ===== TRANSPORT LINES ===== */

    .transport-lines {
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .transport-group {
      margin-top: 4px;
    }

    .badge {
      display: inline-block;
      border: 2.5px solid var(--mode-border);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      text-align: center;
      line-height: 22px;
      font-weight: 800;
      margin-right: 6px;
      color: var(--text-main);
    }

    .error {
      color: #ff6b6b;
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="page-header">
    <h1>Parkings relais <span>– places disponibles</span></h1>
  </header>

  <!-- ===== LIST ===== -->
  <div id="app"></div>

  <script>
    fetch("/api/parkings-relais")
      .then(r => r.json())
      .then(data => {
        const root = document.getElementById("app");
        const parkings = data.values;

        if (!Array.isArray(parkings)) {
          root.innerHTML = "<div class='error'>Aucune donnée disponible</div>";
          return;
        }

        parkings.forEach(p => {
          const ratio = p.nb_tot_place_dispo / p.capacite;
          let level = 0;
          if (ratio > 0.75) level = 4;
          else if (ratio > 0.5) level = 3;
          else if (ratio > 0.25) level = 2;
          else if (ratio > 0) level = 1;

          const lines = p.transport_lines || {};

          const card = document.createElement("div");
          card.className = "parking-card";
          card.innerHTML = `
            <div class="parking-name">${p.nom}</div>

            <div class="availability-row">
              <div class="availability-text">
                <div class="count">${p.nb_tot_place_dispo}</div>
                <div class="label">places disponibles</div>
              </div>

              <div class="fill-gauge fill-${level}">
                <span></span><span></span><span></span><span></span>
              </div>
            </div>

            ${
              (lines.metro || lines.tram || lines.bus) ? `
              <div class="transport-lines">
                ${lines.metro ? `<div class="transport-group"><span class="badge">M</span> ${lines.metro.join(", ")}</div>` : ``}
                ${lines.tram ? `<div class="transport-group"><span class="badge">T</span> ${lines.tram.join(", ")}</div>` : ``}
                ${lines.bus ? `<div class="transport-group"><span class="badge">B</span> ${lines.bus.join(", ")}</div>` : ``}
              </div>
            ` : ``}
          `;
          root.appendChild(card);
        });
      });
  </script>

</body>
</html>
``
