<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P+R – V1</title>

  <style>
    :root {
      --bg: #0f131a;
      --card: #161b24;

      --text-main: #ffffff;
      --text-muted: #a5adbd;

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;

      --gauge-bg: #2a2f3a;

      --mode-border: #3a4153;
      --mode-text: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
    }

    .parking-card {
      max-width: 380px;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
    }

    .parking-name {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* --- Disponibilité --- */

    .availability-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .availability-text {
      display: flex;
      flex-direction: column;
    }

    .free-places {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.1;
    }

    .label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* --- Jauge de remplissage (0/4 → 4/4) --- */

    .fill-gauge {
      display: flex;
      gap: 4px;
    }

    .fill-gauge span {
      width: 10px;
      height: 14px;
      border-radius: 3px;
      background: var(--gauge-bg);
    }

    .fill-1 span:nth-child(-n+1) { background: var(--red); }
    .fill-2 span:nth-child(-n+2) { background: var(--orange); }
    .fill-3 span:nth-child(-n+3) { background: var(--green); }
    .fill-4 span:nth-child(-n+4) { background: var(--green); }

    /* --- Modalités de transport --- */

    .transports {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .mode {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--mode-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--mode-text);
    }
  </style>
</head>

<body>

  <div class="parking-card">

    <div class="parking-name">Mermoz Pinel</div>

    <!-- Disponibilité -->
    <div class="availability-row">
      <div class="availability-text">
        <div class="free-places">6</div>
        <div class="label">places libres</div>
      </div>

      <!-- Jauge de remplissage (ici 1/4) -->
      <div class="fill-gauge fill-1">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Modalités de transport -->
    <div class="transports">
      <div class="mode" title="Métro">M</div>
      <div class="mode" title="Tram">T</div>
      <div class="mode" title="Bus">B</div>
      <div class="mode" title="Vélo'v">V</div>
    </div>

  </div>

</body>
</html>
