<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>P+R</title>

  <style>
    body {
      background:#0f131a;
      font-family:system-ui;
      color:#fff;
      padding:16px;
    }
    .card {
      background:#161b24;
      padding:16px;
      border-radius:14px;
      max-width:380px;
      margin-bottom:16px;
    }
    .name {
      color:#a5adbd;
      font-size:14px;
      margin-bottom:10px;
    }
    .row {
      display:flex;
      align-items:center;
      gap:12px;
    }
    .count {
      font-size:32px;
      font-weight:700;
      line-height:1.1;
    }
    .label {
      font-size:13px;
      color:#a5adbd;
    }
    .gauge {
      display:flex;
      gap:4px;
    }
    .gauge span {
      width:10px;
      height:14px;
      border-radius:3px;
      background:#2a2f3a;
    }
    .g1 span:nth-child(-n+1){background:#ef4444;}
    .g2 span:nth-child(-n+2){background:#f59e0b;}
    .g3 span:nth-child(-n+3){background:#22c55e;}
    .g4 span:nth-child(-n+4){background:#22c55e;}

    .modes {
      display:flex;
      gap:12px;
      margin-top:14px;
    }
    .mode {
      width:30px;height:30px;
      border:2.5px solid #e2e8f0;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
    }
  </style>
</head>

<body>
  <div id="app"></div>

<script>
fetch("/api/parkings-relais")
  .then(r => r.json())
  .then(data => {

    const parkings = data.values; // ✅ VRAIE structure

    const root = document.getElementById("app");

    parkings.forEach(p => {

      const ratio = p.nb_tot_place_dispo / p.capacite;
      let level = 0;
      if (ratio > 0.75) level = 4;
      else if (ratio > 0.5) level = 3;
      else if (ratio > 0.25) level = 2;
      else if (ratio > 0) level = 1;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="name">${p.nom}</div>
        <div class="row">
          <div>
            <div class="count">${p.nb_tot_place_dispo}</div>
            <div class="label">places libres</div>
          </div>
          <div class="gauge g${level}">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="modes">
          <div class="mode">M</div>
          <div class="mode">T</div>
          <div class="mode">B</div>
          <div class="mode">V</div>
        </div>
      `;
      root.appendChild(card);
    });
  });
</script>
</body>
</html>
