<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .parking {
      background: white;
      margin: 1rem;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .ok { color: #15803d; }
    .warn { color: #c2410c; }
    .full { color: #b91c1c; }
  </style>
</head>

<body>

<header>Parkings relais TCL – LIVE</header>

<div id="list">Chargement…</div>

<script>
(async function () {
  const list = document.getElementById("list");

  const res = await fetch("/api/parkings-relais");
  const payload = await res.json();

  console.log("RAW DATA:", payload);

  const parkings = Array.isArray(payload.data) ? payload.data : [];

  if (parkings.length === 0) {
    list.textContent = "Aucun parking disponible";
    return;
  }

  // ✅ RENDU EN UNE SEULE PASSE (clé du déblocage)
  let html = "";

  for (const p of parkings) {
    const libres = p.capacite - (p.place_hand ?? 0);
    const taux = libres / p.capacite;

    let cls = "ok";
    if (taux < 0.2) cls = "full";
    else if (taux < 0.5) cls = "warn";

    html += `
      <div class="parking ${cls}">
        <strong>${p.nom}</strong><br/>
        ${libres} places libres / ${p.capacite}
      </div>
    `;
  }

  list.innerHTML = html;
})();
</script>

</body>
</html>
