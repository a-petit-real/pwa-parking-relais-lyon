<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkings relais TCL – LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      color: #0f172a;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 600;
    }

    #list {
      padding: 1rem;
    }

    .parking {
      background: white;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .ok   { border-left: 6px solid #15803d; }
    .warn { border-left: 6px solid #c2410c; }
    .full { border-left: 6px solid #b91c1c; }

    .name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .info {
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

<header>Parkings relais TCL – LIVE</header>

<div id="list">Chargement…</div>

<script>
(async function () {
  const container = document.getElementById("list");

  try {
    const response = await fetch("/api/parkings-relais");
    const payload = await response.json();

    console.log("RAW DATA:", payload);

    // ✅ DONNÉES RÉELLES CONFIRMÉES
    const parkings = payload.data;

    if (!parkings || parkings.length === 0) {
      container.textContent = "Aucun parking disponible";
      return;
    }

    let html = "";

    for (const p of parkings) {
      const nom = p.nom;
      const capacite = p.capacite;
      const placesLibres = capacite - (p.place_hand ?? 0);

      const taux = placesLibres / capacite;

      let cls = "ok";
      if (taux < 0.2) cls = "full";
      else if (taux < 0.5) cls = "warn";

      html += `
        <div class="parking ${cls}">
          <div class="name">${nom}</div>
          <div class="info">
            ${placesLibres} places libres / ${capacite}
          </div>
        </div>
      `;
    }

    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    container.textContent = "Erreur de chargement des données";
  }
})();
</script>

</body>
</html>
